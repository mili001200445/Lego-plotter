<!-- BOOST Plotter Wizard – HTML + CSS (responsive, fixes applied) -->
<div id="app">
  <style>
  html, body {
  overscroll-behavior: none;  /* niente pull-to-refresh/bounce */
}

:root {
  --green:#4CAF50;
  --red:#ED0000;
  --text:#222;
  --border:#eee;
  --bg:#fafafa;
  --pad:16px;
  --header-h:56px;
  --canvas-gutter:8px;
}

/* Base */
#app { font-family: Arial, sans-serif; color:var(--text); background:var(--bg); container-type:inline-size; }
.header-bar {
  padding:12px 16px; display:flex; align-items:center; justify-content:space-between;
  background:#fff; border-bottom:1px solid var(--border);
}
.title { font-size:18px; margin:0; }
.status { font-size:12px; opacity:.8; }

/* Grid wrapper: no overflow */
.wrap {
  display:grid;
  grid-template-columns: minmax(0, 1fr) minmax(300px, 360px);
  gap:16px;
  padding:16px;
  max-width:100vw;
  overflow-x:hidden;
  box-sizing:border-box;
}
.panel { background:#fff; border:1px solid var(--border); border-radius:8px; padding:12px; min-width:0; }
.row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:8px 0; min-width:0; }
.label { font-size:12px; opacity:.8; min-width:90px; }
.note { font-size:12px; opacity:.8; }

/* Buttons */
.btn {
  user-select:none; display:inline-flex; align-items:center; gap:6px;
  border:2px solid var(--green); background:var(--green); color:#fff;
  font-weight:600; font-size:14px; padding:10px 14px; border-radius:6px;
  cursor:pointer; transition:.15s;
  justify-content: center;
  text-align: center;
}
.btn:hover { background:#fff; color:var(--green); }
.btn:disabled { opacity:.5; cursor:not-allowed; background:#ccc; border-color:#bbb; color:#666; }
.btn.red { border-color:var(--red); background:var(--red); }
.btn.red:hover { color:var(--red); background:#fff; }
.btn.small { padding:8px 12px; font-size:14px; }

/* Preview panel width cap (desktop) */
.preview-panel { max-width: 560px; }

.stage {
 touch-action: none; 
  position:relative;
  background:#fff; border:1px solid #ddd; border-radius:0;
  display:flex; align-items:center; justify-content:center; overflow:hidden;
  /* CONSENTI lo scroll pagina anche se tocchi la canvas */
  touch-action: pan-y pinch-zoom;

  /* ratio fisso 96x128 */
  aspect-ratio: 3 / 4;

  /* desktop: compatta ma senza forzare l’altezza (niente distorsioni) */
  width: min(42vw, 380px);
  max-width: 100%;

  /* RIMOSSO qualsiasi height/max-height che schiaccia l'AR */
  padding: var(--canvas-gutter);
  box-sizing: border-box;
}

#stage {
  touch-action: none;         /* niente scroll/zoom di default */
}

#canvas {
  touch-action: none; 
  width: 100%;
  height: auto;       /* mantiene il ratio dettato dallo stage */
  max-width: 100%;
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}


/* Image controls: allineati a destra */
.preview-panel .img-controls { justify-content:left; gap:12px; width:100%; }

/* Sliders SEMPRE full width (una colonna) */
.preview-panel .sliders { display:flex; flex-direction:column; gap:12px; width:100%; }
.preview-panel .sliders .slider-col { display:flex; flex-direction:column; gap:6px; width:100%; }
input[type=range] { width:100%; }

/* Robot controls */
.robot-controls { gap:10px; flex-wrap:wrap; }

/* Log */
#log {
  width:100%; height:100px; white-space:pre; overflow:auto; background:#111; color:#0f0;
  font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  padding:8px; border-radius:6px;
}

/* Connect clone visibility (desktop hidden) */
.connect-mobile { display:none; }

/* ========= Responsive via CONTAINER QUERY ========= */
@container (max-width: 900px) {
  .wrap { grid-template-columns: 1fr; }
  .header-actions { display:none; }
  .connect-mobile { display:block; }
  .connect-mobile .btn { width:100%; justify-content:center; text-align:center; }

  .preview-panel { max-width:none; }

  .stage {
    width: 30vw;     /* metà schermo */
    max-width: none;
    height: auto;    /* NON fissare height: il ratio fa il resto */
    margin: 0 auto;  /* centrata */
  }
}

@media (max-width: 900px) {
  .stage {
    width: 30vw;
    max-width: none;
    height: auto;
    margin: 0 auto;
  }
}


  </style>
